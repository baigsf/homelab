- name: News
  # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
  # hide-desktop-navigation: true
  columns:
    - size: small
      widgets:
        - type: calendar
          first-day-of-week: monday

        - type: rss
          limit: 10
          collapse-after: 3
          cache: 12h
          feeds:
            - url: https://selfh.st/rss/
              title: selfh.st
            - url: https://www.motorsport.com/rss/f1/news/
              title: Motorsport.com

        - type: twitch-channels
          channels:
            - theprimeagen
            - christitustech
            - shawncee
            - xqc

    - size: full
      widgets:
        - type: group
          widgets:
            - type: hacker-news
            - type: lobsters

        - type: videos
          channels:
              - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
              - UCdU3K0pmvsuxcHFaI3aWKHw # Tech Flow
              - UCjSEJkpGbcZhvo0lr-44X_w # Tech Hut
              - UCcaTUtGzOiS4cqrgtcsHYWg # JvScholz
              - UCUyeluBRhGPCW4rPe_UvBZQ # ThePrimeTime
              - UCg6gPGh8HU2U01vaFCAsvmQ # ChrisTitusTechTips
              - UCWqW23Ko6dbscptZYyQE-8A # ZipTieTuning
              - UCUpt_5O1vYpWAGg77iNMQXA # ZipTieTech
              - UCZTMvlskGKEC0ZDxHgSB_1g # Evan Monsma

        - type: group
          widgets:
            - type: reddit
              subreddit: technology
              show-thumbnails: true
            - type: reddit
              subreddit: selfhosted
              show-thumbnails: true
            - type: reddit
              subreddit: worldnews
              show-thumbnails: true
            - type: reddit
              subreddit: JDM
              show-thumbnails: true
            - type: reddit
              subreddit: homelab
              show-thumbnails: true

    - size: small
      widgets:
        - type: weather
          location: Cincinnati, United States
          units: imperial # alternatively "imperial"
          hour-format: 12h # alternatively "24h"
          # Optionally hide the location from being displayed in the widget
          # hide-location: true

        - type: markets
          markets:
            - symbol: SPY
              name: S&P 500
            - symbol: BTC-USD
              name: Bitcoin
            - symbol: NVDA
              name: NVIDIA
            - symbol: AAPL
              name: Apple
            - symbol: MSFT
              name: Microsoft

        - type: releases
          cache: 1d
          # Without authentication the Github API allows for up to 60 requests per hour. You can create a
          # read-only token from your Github account settings and use it here to increase the limit.
          # token: ...
          repositories:
            - glanceapp/glance
            - ChrisTitusTech/winutil
            - jellyfin/jellyfin
            - zen-browser/desktop
