- name: News
  # hide-desktop-navigation: true
  columns:
    - size: small
      widgets:
        - type: clock
          hour-format: 24h
          timezones:
            - timezone: America/Los_Angeles
              label: LA
            - timezone: Asia/Tokyo
              label: Tokyo
            - timezone: Europe/Paris
              label: Paris

        - type: calendar
          first-day-of-week: monday

        - type: twitch-channels
          channels:
            - theprimeagen
            - christitustech
            - shawncee
            - xqc

    - size: full
      widgets:
        - type: videos
          channels:
            - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
            - UCdU3K0pmvsuxcHFaI3aWKHw # Tech Flow
            - UCjSEJkpGbcZhvo0lr-44X_w # Tech Hut
            - UCcaTUtGzOiS4cqrgtcsHYWg # JvScholz
            - UCUyeluBRhGPCW4rPe_UvBZQ # ThePrimeTime
            - UCg6gPGh8HU2U01vaFCAsvmQ # ChrisTitusTechTips
            - UCWqW23Ko6dbscptZYyQE-8A # ZipTieTuning
            - UCUpt_5O1vYpWAGg77iNMQXA # ZipTieTech
            - UCZTMvlskGKEC0ZDxHgSB_1g # Evan Monsma

        - type: group
          widgets:
            - type: reddit
              subreddit: technology
              show-thumbnails: true
            - type: reddit
              subreddit: selfhosted
              show-thumbnails: true
            - type: reddit
              subreddit: worldnews
              show-thumbnails: true
            - type: reddit
              subreddit: JDM
              show-thumbnails: true
            - type: reddit
              subreddit: homelab
              show-thumbnails: true
            - type: reddit
              subreddit: linux
              show-thumbnails: true
            - type: reddit
              subreddit: formula1
              show-thumbnails: true
            - type: reddit
              subreddit: tennis
              show-thumbnails: true

    - size: small
      widgets:
        - type: weather
          location: Cincinnati, United States
          units: imperial
          hour-format: 12h

        - type: markets
          markets:
            - symbol: SPY
              name: S&P 500
            - symbol: BTC-USD
              name: Bitcoin
            - symbol: NVDA
              name: NVIDIA
            - symbol: AAPL
              name: Apple
            - symbol: MSFT
              name: Microsoft

        - type: releases
          cache: 1d
          repositories:
            - glanceapp/glance
            - ChrisTitusTech/winutil
            - jellyfin/jellyfin
            - zen-browser/desktop
