name: Docker Check

on:
  push:
    branches:
      - main
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - "docker-compose.yml"
      - "docker-compose.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - "docker-compose.yml"
      - "docker-compose.yaml"
  workflow_dispatch:

jobs:
  compose-check:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config
