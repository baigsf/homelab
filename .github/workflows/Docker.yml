name: Docker Check

on:
  push:
    branches:
      - main
    paths:
      - "**/*.yml"
      - "**/*.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.yml"
      - "**/*.yaml"
  workflow_dispatch:

jobs:
  compose-check:
    name: Validate Docker Compose Files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Glance Docker Compose
        run: docker compose -f glance/docker-compose.yml config

      - name: Validate Kuma Docker Compose
        run: docker compose -f uptime-kuma/docker-compose.yml config
