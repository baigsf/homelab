name: Docker Check

on:
  push:
    branches:
      - main
    paths:
      - "glance/**"
      - "uptime-kuma/**"
      - ".github/workflows/docker-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - "glance/**"
      - "uptime-kuma/**"
      - ".github/workflows/docker-check.yml"
  workflow_dispatch:

jobs:
  compose-check:
    name: Validate Docker Compose Files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Glance Docker Compose
        run: docker compose -f glance/docker-compose.yml config

      - name: Validate Uptime Kuma Docker Compose
        run: docker compose -f uptime-kuma/docker-compose.yml config
