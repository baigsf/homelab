name: Lint Checker

on:
  push:
    branches:
      - main
    paths:
      - "**/*.yml"
      - "**/*.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.yml"
      - "**/*.yaml"
  workflow_dispatch:

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run YAML Lint
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          config_data: |
            extends: default
            rules:
              anchors: enable
              braces: disable
              brackets: disable
              colons: disable
              commas: disable
              comments: disable
              comments-indentation: disable
              document-end: disable
              document-start: disable
              empty-lines: disable
              empty-values: enable
              hyphens: disable
              indentation: disable
              key-duplicates: enable
              line-length: disable
              new-line-at-end-of-file: disable
              new-lines: disable
              trailing-spaces: disable
              truthy: disable
